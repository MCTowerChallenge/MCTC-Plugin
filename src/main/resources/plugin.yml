name: TowerChallenge
version: '${project.version}'
main: io.github.idkahn.towerchallenge.TowerChallenge
api-version: 1.19
prefix: TowerChallenge
depend:
  - WorldGuard
  - WorldEdit
  - NBTAPI
  - GSit
commands:
  tower:
    description: Commands relating to the towers
    usage: /tower
    permission: towerchallenge.tower
  hat:
    description: Opens the hat gui
    usage: /hat
  wand:
    description: Opens the wand gui
    usage: /wand
    permission: towerchallenge.wand
  timer:
    description: Commands relating to the Event Timer
    usage: /timer
    permission: towerchallenge.timer
  questbook:
    description: Gives the player a questbook
    usage: /questbook
    aliases:
      - qb
  god:
    description: Toggles player invulnerability
    usage: /god
    permission: towerchallenge.god
  broadcast:
    description: Broadcasts a message to all players
    usage: /broadcast
    permission: towerchallenge.broadcast
    aliases:
      - bc
      - bcast
      - announce
  enderchest:
    description: Opens the player's enderchest
    usage: /enderchest
    permission: towerchallenge.enderchest
    aliases:
      - ec
  anvil:
    description: Opens an anvil inventory
    usage: /anvil
    permission: towerchallenge.anvil
    aliases:
      - av
  rename:
    description: Renames an item
    usage: /rename <Name>
    permission: towerchallenge.rename
  inventorysee:
    description: Views a player's inventory
    usage: /<command> [Player Name]
    permission: towerchallenge.invsee
    aliases:
      - invsee
  penelope:
    description: Commands for controlling Penelope events
    usage: /penelope [create|remove|set|reload]
    permission: towerchallenge.penelope
  candy:
    description: commands for candy
    usage: /candy
    permission: towerchallenge.candy
  steve:
    description: commands for steve
    usage: /steve
  msg:
    description: message
    usage: /msg <Player> <Message>
  godhelp:
    description: Messages the gods
    usage: /godhelp <Message>
    aliases:
      - gh
  godmenu:
    description: Gets the god menu book
    usage: /godmenu
    permission: towerchallenge.godmenu
    aliases:
      - gm
  back:
    description: Teleports you to your last location
    usage: /back
    permission: towerchallenge.back
  resourcepack:
    description: Utilities for the Resource Pack
    usage: /resourcepack
    aliases:
      - rp
      - pack