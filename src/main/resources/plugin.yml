name: TowerChallenge
version: '${project.version}'
main: io.github.idkahn.towerchallenge.TowerChallenge
api-version: 1.19
depend:
  - WorldGuard
  - WorldEdit
  - NBTAPI
commands:
  tower:
    description: Commands relating to the towers
    usage: /tower
  hat:
    description: Opens the hat gui
    usage: /hat
  timer:
    description: Commands relating to the Event Timer
    usage: /timer
  questbook:
    description: Gives the player a questbook
    usage: /questbook
    aliases:
      - qb
  god:
    description: Toggles player invulnerability
    usage: /god